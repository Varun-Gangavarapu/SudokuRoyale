<!DOCTYPE html>
<!-- you missed the opening html tag in line 3 -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku</title>
    <script src="../build/index.js"></script>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <h1>Sudoku</h1>
    <hr />
    <!-- might be better to use padding and margin instead of br to keep styling in stylesheet -->
    <br />

    <div class="container">
      <div class="col">
        <!-- 9x9 board -->
        <div id="board"></div>
      </div>
      <div class="col">
        <div class="row2">
          <div id="choice-bar">
            <div id="numeros">Numbers</div>
            <div id="possibilites">Candidates</div>
          </div>
          <div id="digits"></div>
          <div id="remover">X</div>
          <h4 id="timer"></h4>
          <!-- too lazy to check where this is on screen but I put it in the second column -->
          <h2 id="wins"></h2>
        </div>
      </div>
    </div>
  </body>
</html>
